<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skrinka - Inteligentný zoznam</title>
    <style>
        :root { --green: #2ecc71; --dark: #2c3e50; --bg: #f4f7f6; --blue: #3498db; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; min-height: 100vh; flex-direction: row; }
        .sidebar { width: 250px; background: var(--dark); color: white; padding: 20px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        .sidebar h2 { color: var(--green); text-align: center; margin-bottom: 15px; font-size: 1.3rem; }
        .sidebar a { color: #bdc3c7; text-decoration: none; padding: 12px; border-radius: 8px; font-size: 0.95rem; }
        .sidebar a.active { background: var(--green); color: white; font-weight: bold; }
        .main-content { flex-grow: 1; padding: 25px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 5px solid var(--blue); }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 5px; border-bottom: 1px solid #eee; }
        .date-text { color: #000; font-weight: 600; margin-right: 15px; font-size: 1rem; }
        .delete-btn { background: #ffeded; color: #e74c3c; border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 1.1rem; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; padding: 10px; flex-direction: row; flex-wrap: wrap; justify-content: center; box-sizing: border-box; }
            .sidebar h2 { width: 100%; font-size: 1.1rem; }
            .sidebar a { padding: 8px 10px; font-size: 0.8rem; }
            .main-content { padding: 15px; }
            .item-row { flex-direction: column; align-items: flex-start; gap: 10px; }
            .item-row div { width: 100%; display: flex; justify-content: space-between; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2>Inteligentný zoznam</h2>
        <a href="index.html">Domov</a>
        <a href="chladnicka.html">Chladnička</a>
        <a href="mraznicka.html">Mraznička</a>
        <a href="skrinka.html" class="active">Skrinka</a>
        
    </aside>
    <main class="main-content">
        <h1>Potravinová skrinka</h1>
        <div id="listContainer"></div>
    </main>
    <script>
        function renderList() {
            const container = document.getElementById('listContainer');
            const inv = JSON.parse(localStorage.getItem('pantryDB')) || [];
            const filtered = inv.filter(i => i.loc === 'skrinka');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="card"><p>Prázdno.</p></div>';
                return;
            }
            const cats = [...new Set(filtered.map(i => i.cat))];
            container.innerHTML = '';
            cats.forEach(c => {
                let html = `<div class="card"><h3>${c}</h3>`;
                filtered.filter(i => i.cat === c).forEach(it => {
                    const dma = it.date.split('-').reverse().join('.');
                    html += `<div class="item-row">
                        <span style="font-weight:bold;">${it.name}</span>
                        <div>
                            <span class="date-text">${dma}</span>
                            <button class="delete-btn" onclick="removeItem('${it.name}', '${it.date}')">🗑️</button>
                        </div>
                    </div>`;
                });
                html += `</div>`;
                container.innerHTML += html;
            });
        }
        function removeItem(n, d) {
            if (!confirm(`Vymazať ${n}?`)) return;
            let inv = JSON.parse(localStorage.getItem('pantryDB')) || [];
            inv = inv.filter(it => !(it.name === n && it.date === d));
            localStorage.setItem('pantryDB', JSON.stringify(inv));
            renderList();
        }
        window.onload = renderList;
    </script>
</body>
</html>
