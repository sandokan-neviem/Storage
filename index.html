<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inteligentný zoznam - Domov</title>
    <style>
        :root { 
            --green: #2ecc71; 
            --dark: #2c3e50; 
            --bg: #f4f7f6; 
            --orange: #f39c12; 
            --red: #e74c3c; 
            --blue: #3498db;
            --purple: #9b59b6;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            display: flex; 
            min-height: 100vh; 
        }
        
        /* SIDEBAR */
        .sidebar { 
            width: 250px; 
            background: var(--dark); 
            color: white; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            flex-shrink: 0; 
        }
        .sidebar h2 { color: var(--green); text-align: center; margin-bottom: 20px; font-size: 1.4rem; }
        .sidebar a { 
            color: #bdc3c7; 
            text-decoration: none; 
            padding: 15px; 
            border-radius: 10px; 
            transition: 0.3s; 
        }
        .sidebar a:hover { background: #34495e; color: white; }
        .sidebar a.active { background: var(--green); color: white; font-weight: bold; }

        /* OBSAH */
        .main-content { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            margin-bottom: 25px; 
        }

        /* KALENDÁR */
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cal-nav button { padding: 10px 20px; cursor: pointer; background: white; border: 1px solid #ddd; border-radius: 8px; }
        
        .cal-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            background: #eee; 
            gap: 1px; 
            border: 1px solid #eee; 
            border-radius: 10px; 
            overflow: hidden; 
        }
        .cal-header { background: #f8f9fa; padding: 15px; text-align: center; font-weight: bold; }
        
        .day-box { background: white; min-height: 110px; padding: 8px; display: flex; flex-direction: column; }
        .day-box.empty { background: #fafafa; }
        .day-number { font-weight: bold; margin-bottom: 8px; }
        .today { background: #ebfaf1; box-shadow: inset 0 0 0 2px var(--green); }

        /* PALIČKY */
        .dot-container { display: flex; flex-direction: column; gap: 3px; width: 100%; }
        .dot { height: 7px; border-radius: 4px; cursor: pointer; width: 100%; border: none; }
        .dot-green { background: var(--green); }
        .dot-orange { background: var(--orange); }
        .dot-red { background: var(--red); }

        /* FORMULÁR */
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, button { padding: 14px; border-radius: 10px; border: 1px solid #ddd; font-size: 1rem; }
        .save-btn { background: var(--green); color: white; border: none; font-weight: bold; cursor: pointer; grid-column: span 2; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>Inteligentný zoznam</h2>
        <a href="index.html" class="active">Domov</a>
        <a href="chladnicka.html">Chladnička</a>
                <a href="mraznicka.html">Mraznička</a>

        <a href="skrinka.html">Potravinová skrinka</a>
    </aside>

    <main class="main-content">
        <h1>Domov</h1>

        <div class="card">
            <div class="cal-nav">
                <button onclick="changeMonth(-1)">◀</button>
                <h2 id="monthLabel" style="margin:0;"></h2>
                <button onclick="changeMonth(1)">▶</button>
            </div>
            
            <div class="cal-grid">
                <div class="cal-header">Po</div><div class="cal-header">Ut</div><div class="cal-header">St</div>
                <div class="cal-header">Št</div><div class="cal-header">Pi</div><div class="cal-header">So</div><div class="cal-header">Ne</div>
                <div id="calendarDays" style="display: contents;"></div>
            </div>
        </div>

        <div class="card">
            <h3>Pridať novú potravinu</h3>
            <div class="grid-form">
                <input type="text" id="name" placeholder="Názov produktu">
                <input type="date" id="date">
                
                <select id="cat">
                    <option value="Pečivo">Pečivo</option>
                    <option value="Mäso">Mäso</option>
                    <option value="Ovocie">Ovocie</option>
                    <option value="Zelenina">Zelenina</option>
                    <option value="Mliečne výrobky">Mliečne výrobky</option>
                    <option value="Sladkosti">Sladkosti</option>
                    <option value="Múky / Cukre">Múky / Cukre</option>
                    <option value="Šunky">Šunky</option>
                    <option value="Iné">Iné</option>
                </select>

                <select id="loc">
                    <option value="chladnicka">Chladnička</option>
                    <option value="skrinka">Skrinka</option>
                    <option value="mraznicka">Mraznička</option>
                </select>
                
                <button class="save-btn" onclick="saveItem()">Uložiť do zásob</button>
            </div>
        </div>
    </main>

    <script>
        let inv = JSON.parse(localStorage.getItem('pantryDB')) || [];
        let currDate = new Date();

        function renderCalendar() {
            const grid = document.getElementById('calendarDays');
            const label = document.getElementById('monthLabel');
            grid.innerHTML = '';

            const year = currDate.getFullYear();
            const month = currDate.getMonth();
            label.innerText = new Intl.DateTimeFormat('sk-SK', { month: 'long', year: 'numeric' }).format(currDate);

            const firstDay = new Date(year, month, 1).getDay();
            const shift = (firstDay === 0 ? 6 : firstDay - 1);
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            today.setHours(0,0,0,0);

            for (let i = 0; i < shift; i++) grid.innerHTML += '<div class="day-box empty"></div>';

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const items = inv.filter(it => it.date === dateStr);
                const isToday = d === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear();
                
                let dotsHtml = '';
                items.forEach(it => {
                    const diffDays = Math.ceil((new Date(it.date) - today) / (1000 * 60 * 60 * 24));
                    let color = 'dot-green';
                    if (diffDays <= 2) color = 'dot-red';
                    else if (diffDays <= 5) color = 'dot-orange';

                    dotsHtml += `<div class="dot ${color}" onclick="showDetail('${it.name}', '${it.date}')"></div>`;
                });

                grid.innerHTML += `
                    <div class="day-box ${isToday ? 'today' : ''}">
                        <span class="day-number">${d}</span>
                        <div class="dot-container">${dotsHtml}</div>
                    </div>`;
            }
        }

        function showDetail(name, date) {
            alert("Potravina: " + name + "\nSpotrebujte do: " + date.split('-').reverse().join('.'));
        }

        function saveItem() {
            const n = document.getElementById('name').value;
            const d = document.getElementById('date').value;
            if(!n || !d) return alert("Zadaj názov a dátum!");
            
            inv.push({name:n, date:d, cat:document.getElementById('cat').value, loc:document.getElementById('loc').value});
            localStorage.setItem('pantryDB', JSON.stringify(inv));
            
            document.getElementById('name').value = '';
            document.getElementById('date').value = '';
            renderCalendar();
        }

        function changeMonth(s) { currDate.setMonth(currDate.getMonth() + s); renderCalendar(); }
        window.onload = renderCalendar;
    </script>
</body>
</html>
